version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rentcontrol-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-rentcontrol}
    ports:
      - "5432:5432"
    volumes:
      - rentcontrol-pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rentcontrol-backend
    restart: always
    depends_on:
      - db
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@db:5432/${POSTGRES_DB:-rentcontrol}?schema=public
      - PUBLIC_URL=https://radiotecpro.com/api
      - FACTURAPRO_API_URL=https://facturapro.radiotecpro.com/api
      - FACTURAPRO_FRONTEND_URL=https://facturapro.radiotecpro.com
      # Las demás variables de entorno se leerán de tu archivo .env local
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/whatsapp-session:/app/whatsapp-session
      - ./backend/.wwebjs_cache:/app/.wwebjs_cache

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://radiotecpro.com/api
    container_name: rentcontrol-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://radiotecpro.com/api

volumes:
  rentcontrol-pgdata:
